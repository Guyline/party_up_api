default: &default
  adapter: mysql2
  encoding: utf8
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: party_up
  password: <%= Rails.application.credentials.database_password %>
  host: localhost
  port: 3306

development:
  <<: *default
  database: party_up_development

test:
  <<: *default
  database: party_up_test

production:
  <<: *default
  database: party_up